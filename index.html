<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李白詩詞射擊 - 究極穩定版</title>
    <style>
        body { margin: 0; background: #f4f1de; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: "STKaiti", "Microsoft JhengHei", serif; }
        #game-wrapper { position: relative; border: 5px solid #3d405b; background: #f4f1de; }
        canvas { display: block; }
        .ui-box { position: absolute; top: 20px; left: 20px; color: #3d405b; pointer-events: none; }
        #target-display { font-size: 2.2em; font-weight: bold; color: #e07a5f; margin-top: 5px; }
        #score-display { position: absolute; top: 20px; right: 20px; color: #3d405b; font-weight: bold; font-size: 1.2em; }
        #overlay { position: absolute; inset: 0; background: rgba(244, 241, 222, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        button { padding: 15px 45px; font-size: 1.2em; background: #3d405b; color: white; border: none; cursor: pointer; margin: 10px; border-radius: 8px; transition: 0.2s; }
        button:hover { background: #e07a5f; }
        #msg-popup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px 40px; border: 3px solid #3d405b; display: none; text-align: center; z-index: 200; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="ui-box">
        <div id="poem-info">請選擇關卡</div>
        <div id="target-display">---</div>
    </div>
    <div id="score-display">得分: 0</div>

    <div id="overlay">
        <h1 style="font-size: 3em; color: #3d405b;">李白詩詞射擊</h1>
        <button onclick="bootGame(0)">靜夜思</button>
        <button onclick="bootGame(1)">將進酒</button>
        <button onclick="bootGame(2)">蜀道難</button>
    </div>

    <div id="msg-popup">
        <h2 id="msg-text"></h2>
        <button onclick="closeMsg()">回到選單</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 600;
canvas.height = 800;

const poems = [
    { title: "靜夜思", content: "床前明月光疑是地上霜舉頭望明月低頭思故鄉" },
    { title: "將進酒", content: "君不見黃河之水天上來奔流到海不復回君不見高堂明鏡悲白髮朝如青絲暮成雪" },
    { title: "蜀道難", content: "噫吁嚱危乎高哉蜀道之難難於上青天蠶叢及魚鳧開國何茫然爾來四萬八千歲不與秦塞通人煙" }
];
const commonWords = "的一是在不了有和人這中大來上個國我到說們為子社多時樣後自下以生可能而面分於主行過家開現前出民日發正道成那西對也此法之實重物度後政";

let game = {
    active: false,
    score: 0,
    charIndex: 0,
    data: null,
    words: [],
    bullets: [],
    playerX: 280,
    keys: {},
    lastSpawn: 0,
    lastFire: 0
};

window.addEventListener('keydown', e => { e.preventDefault(); game.keys[e.code] = true; });
window.addEventListener('keyup', e => game.keys[e.code] = false);

function bootGame(idx) {
    game.data = poems[idx];
    game.charIndex = 0;
    game.score = 0;
    game.words = [];
    game.bullets = [];
    game.active = true;
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('msg-popup').style.display = 'none';
    document.getElementById('poem-info').innerText = "《" + game.data.title + "》";
    refresh();
    requestAnimationFrame(loop);
}

function refresh() {
    const next = game.data.content[game.charIndex];
    document.getElementById('target-display').innerText = next ? "下一字：「" + next + "」" : "完成！";
    document.getElementById('score-display').innerText = "得分: " + game.score;
}

function loop(t) {
    if (!game.active) return;

    // 1. 玩家移動 & 發射
    if (game.keys['ArrowLeft'] && game.playerX > 0) game.playerX -= 8;
    if (game.keys['ArrowRight'] && game.playerX < 560) game.playerX += 8;
    if (game.keys['Space'] && t - game.lastFire > 220) {
        game.bullets.push({ x: game.playerX + 20, y: 720 });
        game.lastFire = t;
    }

    // 2. 清除畫面
    ctx.fillStyle = '#f4f1de';
    ctx.fillRect(0, 0, 600, 800);

    // 3. 生成文字（每 1.2 秒）
    if (t - game.lastSpawn > 1200) {
        const isTarget = Math.random() > 0.4 && game.charIndex < game.data.content.length;
        game.words.push({
            x: Math.random() * 500 + 50,
            y: -50,
            text: isTarget
                ? game.data.content[game.charIndex]
                : commonWords[Math.floor(Math.random() * commonWords.length)],
            vy: 2.5 + Math.random() * 2
        });
        game.lastSpawn = t;
    }

    // ★ 核心修正：先做碰撞偵測，產出「字被打中」與「子彈消耗」兩份結果
    //    完全不在 filter/forEach 內部修改任何陣列或呼叫 finish()

    // 步驟 A：更新所有子彈位置
    for (const b of game.bullets) { b.y -= 12; }

    // 步驟 B：碰撞偵測 — 純粹收集結果，不動任何陣列
    const hitWordIndices   = new Set(); // 被打中的文字索引
    const hitBulletIndices = new Set(); // 被消耗的子彈索引
    let pendingFinish = false;

    for (let wi = 0; wi < game.words.length; wi++) {
        const w = game.words[wi];
        for (let bi = 0; bi < game.bullets.length; bi++) {
            if (hitBulletIndices.has(bi)) continue; // 子彈已被消耗
            const b = game.bullets[bi];
            if (Math.abs(w.x - b.x) < 30 && Math.abs(w.y - 15 - b.y) < 30) {
                hitWordIndices.add(wi);
                hitBulletIndices.add(bi);
                // 判斷是否打中目標字
                if (w.text === game.data.content[game.charIndex]) {
                    game.score += 10;
                    game.charIndex++;
                    if (game.charIndex >= game.data.content.length) {
                        pendingFinish = true;
                    }
                } else {
                    game.score = Math.max(0, game.score - 5);
                }
                refresh();
                break; // 一個字只能被一顆子彈打中
            }
        }
    }

    // 步驟 C：依結果過濾陣列（碰撞偵測已完成，安全過濾）
    game.words   = game.words.filter((_, i) => !hitWordIndices.has(i) && game.words[i].y < 850);
    game.bullets = game.bullets.filter((b, i) => !hitBulletIndices.has(i) && b.y > -10);

    // 步驟 D：移動剩餘文字
    for (const w of game.words) { w.y += w.vy; }

    // 4. 繪製文字
    ctx.font = "bold 36px 'STKaiti', serif";
    ctx.textAlign = "center";
    for (const w of game.words) {
        ctx.fillStyle = (w.text === game.data.content[game.charIndex]) ? '#e07a5f' : '#3d405b';
        ctx.fillText(w.text, w.x, w.y);
    }

    // 5. 繪製子彈
    ctx.fillStyle = '#e07a5f';
    for (const b of game.bullets) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
        ctx.fill();
    }

    // 6. 繪製玩家飛船
    ctx.fillStyle = '#3d405b';
    ctx.beginPath();
    ctx.moveTo(game.playerX + 20, 720);
    ctx.lineTo(game.playerX, 760);
    ctx.lineTo(game.playerX + 40, 760);
    ctx.fill();

    // ★ 確保所有繪製完成後，才結束遊戲
    if (pendingFinish) {
        finish();
        return;
    }

    requestAnimationFrame(loop);
}

function finish() {
    game.active = false;
    document.getElementById('msg-text').innerText = "詩篇完成！總分：" + game.score;
    document.getElementById('msg-popup').style.display = 'block';
}

function closeMsg() {
    document.getElementById('msg-popup').style.display = 'none';
    document.getElementById('overlay').style.display = 'flex';
}
</script>
</body>
</html>
