<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李白詩詞射擊 - 穩定修復版</title>
    <style>
        body { margin: 0; background: #f4f1de; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: "STKaiti", "Microsoft JhengHei", serif; }
        #game-container { position: relative; border: 5px solid #3d405b; background: #f4f1de; box-shadow: 0 0 25px rgba(0,0,0,0.3); }
        canvas { display: block; cursor: none; }
        .ui { position: absolute; top: 20px; left: 20px; color: #3d405b; pointer-events: none; z-index: 5; }
        #target-display { font-size: 2.2em; font-weight: bold; color: #e07a5f; margin-top: 5px; text-shadow: 1px 1px 0 #fff; }
        #score-board { position: absolute; top: 20px; right: 20px; text-align: right; color: #3d405b; font-size: 1.2em; font-weight: bold; z-index: 5; }
        #start-screen { position: absolute; inset: 0; background: rgba(244, 241, 222, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        button { padding: 15px 40px; font-size: 1.2em; background: #3d405b; color: white; border: none; cursor: pointer; margin: 10px; border-radius: 8px; transition: 0.2s; }
        button:hover { background: #e07a5f; transform: scale(1.05); }
        .hint { position: absolute; bottom: 15px; width: 100%; text-align: center; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui">
        <div id="poem-title" style="font-size: 1.2em; opacity: 0.8;">請準備...</div>
        <div id="target-display">選取關卡</div>
    </div>
    <div id="score-board">得分: <span id="score">0</span></div>

    <div id="start-screen">
        <h1 style="font-size: 3.5em; color: #3d405b; margin-bottom: 5px;">李白詩詞射擊</h1>
        <p style="margin-bottom: 30px;">按順序擊落詩句文字，莫使金樽空對月</p>
        <button onclick="initGame(0)">靜夜思</button>
        <button onclick="initGame(1)">將進酒</button>
        <button onclick="initGame(2)">蜀道難</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div class="hint">使用 [←][→] 移動，[空白鍵] 發射</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 600;
canvas.height = 800;

const poems = [
    { title: "靜夜思", content: "床前明月光疑是地上霜舉頭望明月低頭思故鄉" },
    { title: "將進酒", content: "君不見黃河之水天上來奔流到海不復回君不見高堂明鏡悲白髮朝如青絲暮成雪" },
    { title: "蜀道難", content: "噫吁嚱危乎高哉蜀道之難難於上青天蠶叢及魚鳧開國何茫然爾來四萬八千歲不與秦塞通人煙" }
];

const commonWords = "的一是在不了有和人這中大來上個國我到說們為子和社多時樣後自下以生可能而面分於主行過家開現前出民日發正道成前那西對也此法之實重物度法後政也";

// 遊戲全域狀態
let state = {
    running: false,
    score: 0,
    index: 0,
    poem: null,
    words: [],
    bullets: [],
    particles: [],
    player: { x: 280, y: 720, w: 40, h: 40 },
    keys: {},
    lastSpawn: 0,
    lastFire: 0,
    speed: 1
};

// 鍵盤事件監聽 (放在外面確保只註冊一次)
window.addEventListener('keydown', e => { state.keys[e.code] = true; });
window.addEventListener('keyup', e => { state.keys[e.code] = false; });

function initGame(idx) {
    state.poem = poems[idx];
    state.index = 0;
    state.score = 0;
    state.words = [];
    state.bullets = [];
    state.particles = [];
    state.speed = 1 + (idx * 0.3);
    state.running = true;
    
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('poem-title').innerText = "正在背誦：《" + state.poem.title + "》";
    refreshUI();
    
    // 確保只啟動一個 Loop
    cancelAnimationFrame(window.gameAnim);
    window.gameAnim = requestAnimationFrame(mainLoop);
}

function refreshUI() {
    const nextChar = state.poem.content[state.index];
    document.getElementById('target-display').innerText = nextChar ? "下一字：「" + nextChar + "」" : "已完成！";
    document.getElementById('score').innerText = state.score;
}

function createBurst(x, y, color) {
    for(let i=0; i<12; i++) {
        state.particles.push({
            x, y, 
            vx: (Math.random()-0.5)*12, 
            vy: (Math.random()-0.5)*12, 
            life: 1, 
            color 
        });
    }
}

function mainLoop(timestamp) {
    if (!state.running) return;

    // 1. 物理更新
    if (state.keys['ArrowLeft'] && state.player.x > 0) state.player.x -= 8;
    if (state.keys['ArrowRight'] && state.player.x < canvas.width - state.player.w) state.player.x += 8;
    
    // 射擊控制
    if (state.keys['Space'] && timestamp - state.lastFire > 200) {
        state.bullets.push({ x: state.player.x + 20, y: state.player.y, r: 5 });
        state.lastFire = timestamp;
    }

    // 2. 渲染背景
    ctx.fillStyle = '#f4f1de';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 3. 生成文字
    if (timestamp - state.lastSpawn > 1000 / state.speed) {
        const isTarget = Math.random() > 0.4 && state.index < state.poem.content.length;
        state.words.push({
            x: Math.random() * 500 + 50,
            y: -50,
            text: isTarget ? state.poem.content[state.index] : commonWords[Math.floor(Math.random()*commonWords.length)],
            speed: (2 + Math.random() * 1.5) * state.speed
        });
        state.lastSpawn = timestamp;
    }

    // 4. 更新文字與碰撞
    state.words.forEach((w, wIdx) => {
        w.y += w.speed;
        ctx.fillStyle = '#3d405b';
        ctx.font = "bold 36px 'STKaiti', serif";
        ctx.textAlign = "center";
        ctx.fillText(w.text, w.x, w.y);

        // 與子彈碰撞
        state.bullets.forEach((b, bIdx) => {
            const dx = w.x - b.x;
            const dy = (w.y - 15) - b.y; // 調整文字視覺中心
            if (Math.sqrt(dx*dx + dy*dy) < 35) {
                if (w.text === state.poem.content[state.index]) {
                    state.score += 10;
                    state.index++;
                    state.speed += 0.02;
                    createBurst(w.x, w.y, 'rgba(0,0,0,0.6)');
                    refreshUI();
                    // 檢查勝利
                    if (state.index >= state.poem.content.length) {
                        state.running = false;
                        setTimeout(() => { 
                            alert("大才子！《" + state.poem.title + "》完成，得分：" + state.score); 
                            location.reload(); 
                        }, 200);
                    }
                } else {
                    state.score = Math.max(0, state.score - 5);
                    createBurst(w.x, w.y, 'rgba(224,122,95,0.7)');
                    refreshUI();
                }
                w.toRemove = true;
                b.toRemove = true;
            }
        });
    });

    // 5. 更新子彈
    state.bullets.forEach(b => {
        b.y -= 12;
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
        ctx.fill();
        if (b.y < -20) b.toRemove = true;
    });

    // 清理物件 (使用 filter 避免索引崩潰)
    state.words = state.words.filter(w => !w.toRemove && w.y < 900);
    state.bullets = state.bullets.filter(b => !b.toRemove);

    // 6. 繪製玩家 (俠客剪影)
    ctx.fillStyle = '#3d405b';
    ctx.beginPath();
    ctx.moveTo(state.player.x + 20, state.player.y);
    ctx.lineTo(state.player.x, state.player.y + 40);
    ctx.lineTo(state.player.x + 40, state.player.y + 40);
    ctx.fill();

    // 7. 粒子系統
    state.particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.03;
        ctx.fillStyle = p.color.replace(/[\d.]+\)$/, p.life + ')');
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5 * p.life, 0, Math.PI*2);
        ctx.fill();
    });
    state.particles = state.particles.filter(p => p.life > 0);

    if (state.running) window.gameAnim = requestAnimationFrame(mainLoop);
}
</script>
</body>
</html>
