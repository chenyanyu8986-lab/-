<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李白詩詞射擊遊戲 - 最終修正版</title>
    <style>
        body { margin: 0; background: #f4f1de; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: "STKaiti", "Microsoft JhengHei", serif; }
        #game-container { position: relative; border: 5px solid #3d405b; background: #f4f1de; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        canvas { display: block; }
        .ui { position: absolute; top: 20px; left: 20px; color: #3d405b; pointer-events: none; }
        #target-display { font-size: 2.5em; font-weight: bold; margin-top: 5px; color: #e07a5f; }
        #score-board { position: absolute; top: 20px; right: 20px; text-align: right; color: #3d405b; font-size: 1.2em; font-weight: bold; }
        #start-screen { position: absolute; inset: 0; background: rgba(244, 241, 222, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        button { padding: 12px 35px; font-size: 1.2em; background: #3d405b; color: white; border: none; cursor: pointer; margin: 10px; border-radius: 5px; transition: 0.2s; }
        button:hover { background: #e07a5f; transform: scale(1.05); }
        .hint { position: absolute; bottom: 15px; width: 100%; text-align: center; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui">
        <div id="poem-title">準備中...</div>
        <div id="target-display">載入中</div>
    </div>
    <div id="score-board">分數: <span id="score">0</span></div>

    <div id="start-screen">
        <h1 style="font-size: 3em; color: #3d405b; margin-bottom: 10px;">詩詞射擊遊戲</h1>
        <p>請按順序射擊正確的字，完成整首詩</p>
        <button onclick="startGame(0)">靜夜思</button>
        <button onclick="startGame(1)">將進酒</button>
        <button onclick="startGame(2)">蜀道難</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div class="hint">鍵盤 [←][→] 移動，[空白鍵] 發射</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 600;
canvas.height = 800;

const poems = [
    { title: "靜夜思", content: "床前明月光疑是地上霜舉頭望明月低頭思故鄉" },
    { title: "將進酒", content: "君不見黃河之水天上來奔流到海不復回君不見高堂明鏡悲白髮朝如青絲暮成雪" },
    { title: "蜀道難", content: "噫吁嚱危乎高哉蜀道之難難於上青天蠶叢及魚鳧開國何茫然爾來四萬八千歲不與秦塞通人煙" }
];

const commonWords = "的一是在不了有和人這中大來上個國我到說們為子和社多時樣後自下以生可能而面分於主行過家開現前出民日發正道成前那西對也此法之實重物度法後政也";

let gameState = 'menu';
let score = 0;
let currentIndex = 0;
let currentPoemData = null;
let words = [];
let bullets = [];
let particles = [];
let player = { x: 280, y: 720, w: 40, h: 40 };
let keys = {};
let lastSpawn = 0;
let lastFire = 0;
let speedMult = 1;

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function startGame(idx) {
    currentPoemData = poems[idx];
    currentIndex = 0;
    score = 0;
    words = [];
    bullets = [];
    particles = [];
    speedMult = 1 + (idx * 0.3);
    gameState = 'playing';
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('poem-title').innerText = "《" + currentPoemData.title + "》";
    updateUI();
    requestAnimationFrame(update);
}

function updateUI() {
    const nextChar = currentPoemData.content[currentIndex];
    document.getElementById('target-display').innerText = nextChar ? "下一字：「" + nextChar + "」" : "完！";
    document.getElementById('score').innerText = score;
}

function createEffect(x, y, color) {
    for(let i=0; i<10; i++) {
        particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color });
    }
}

function update() {
    if (gameState !== 'playing') return;

    // 背景
    ctx.fillStyle = '#f4f1de';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 1. 玩家控制
    if (keys['ArrowLeft'] && player.x > 0) player.x -= 8;
    if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += 8;
    
    const now = Date.now();
    if (keys['Space'] && now - lastFire > 200) {
        bullets.push({ x: player.x + 20, y: player.y, r: 5 });
        lastFire = now;
    }

    // 繪製玩家
    ctx.fillStyle = '#3d405b';
    ctx.beginPath();
    ctx.moveTo(player.x + 20, player.y);
    ctx.lineTo(player.x, player.y + 40);
    ctx.lineTo(player.x + 40, player.y + 40);
    ctx.fill();

    // 2. 生成文字
    if (now - lastSpawn > 1000 / speedMult) {
        const isTarget = Math.random() > 0.4 && currentIndex < currentPoemData.content.length;
        words.push({
            x: Math.random() * 500 + 50,
            y: -30,
            text: isTarget ? currentPoemData.content[currentIndex] : commonWords[Math.floor(Math.random()*commonWords.length)],
            speed: (2 + Math.random() * 2) * speedMult
        });
        lastSpawn = now;
    }

    // 3. 處理文字更新與碰撞
    for (let i = words.length - 1; i >= 0; i--) {
        let w = words[i];
        w.y += w.speed;
        
        ctx.fillStyle = '#3d405b';
        ctx.font = "bold 35px 'STKaiti', serif";
        ctx.textAlign = "center";
        ctx.fillText(w.text, w.x, w.y);

        // 碰撞檢查
        for (let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j];
            let dist = Math.hypot(w.x - b.x, (w.y - 15) - b.y);
            if (dist < 30) {
                if (w.text === currentPoemData.content[currentIndex]) {
                    score += 10;
                    currentIndex++;
                    speedMult += 0.02;
                    createEffect(w.x, w.y, 'rgba(0,0,0,0.6)');
                    updateUI();
                    if (currentIndex >= currentPoemData.content.length) {
                        gameState = 'win';
                        setTimeout(() => { alert("恭喜完成！總分：" + score); location.reload(); }, 100);
                    }
                } else {
                    score = Math.max(0, score - 5);
                    createEffect(w.x, w.y, 'rgba(255,0,0,0.6)');
                    updateUI();
                }
                words.splice(i, 1);
                bullets.splice(j, 1);
                break;
            }
        }
        if (w.y > 850) words.splice(i, 1);
    }

    // 4. 處理子彈更新
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.y -= 12;
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
        ctx.fill();
        if (b.y < -10) bullets.splice(i, 1);
    }

    // 5. 處理粒子
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.03;
        ctx.fillStyle = p.color.replace('0.6', p.life * 0.6);
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI*2);
        ctx.fill();
        if (p.life <= 0) particles.splice(i, 1);
    }

    requestAnimationFrame(update);
}
</script>
</body>
</html>
